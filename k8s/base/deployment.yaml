apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app-deployment
  labels:
    app: node-workshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-workshop
  template:
    metadata:
      labels:
        app: node-workshop
    spec:
      containers:
      - name: node-app
        image: node-workshop-app:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DB_PASSWORD
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
      volumes:
      - name: config-volume
        configMap:
          name: app-config