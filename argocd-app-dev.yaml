apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: node-workshop-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/GoujetP/tp-atelier-kubernetes'
    targetRevision: HEAD
    path: k8s/overlays/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
